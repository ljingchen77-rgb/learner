<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客 - 刘靖臣</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== 分类标签 ===== */
        .category-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }

        .category-tag {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid #dfe6e9;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.2s;
            color: #636e72;
        }

        .category-tag:hover {
            border-color: #0984e3;
            color: #0984e3;
        }

        .category-tag.active {
            background: #0984e3;
            color: white;
            border-color: #0984e3;
        }

        body.dark-mode .category-tag {
            border-color: #2d3748;
            background: #2d3748;
            color: #a0aec0;
        }

        body.dark-mode .category-tag.active {
            background: #0984e3;
            color: white;
        }

        /* ===== 文章条目 ===== */
        .post-item {
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid #dfe6e9;
        }

        body.dark-mode .post-item {
            border-bottom-color: #2d3748;
        }

        .post-item h3 {
            margin-bottom: 4px;
        }

        .post-item h3 a {
            font-size: 17px;
        }

        .post-meta {
            font-size: 13px;
            color: #636e72;
            margin-bottom: 8px;
        }

        .post-categories {
            display: inline-flex;
            gap: 6px;
            margin-left: 8px;
        }

        .post-categories span {
            font-size: 11px;
            padding: 1px 8px;
            border-radius: 10px;
            background: #e8f4fd;
            color: #0984e3;
        }

        body.dark-mode .post-categories span {
            background: #1e3a5f;
            color: #74b9ff;
        }

        .post-summary {
            font-size: 14px;
            color: #555;
        }

        body.dark-mode .post-summary {
            color: #a0aec0;
        }

        /* ===== 文章阅读视图 ===== */
        #post-content {
            display: none;
        }

        #post-content.active {
            display: block;
        }

        #post-list.active {
            display: block;
        }

        #post-list.hidden {
            display: none;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* ===== Markdown 渲染样式 ===== */
        #post-content h1 { font-size: 24px; margin: 20px 0 10px; }
        #post-content h2 { font-size: 20px; margin: 18px 0 8px; display: block; border-bottom: none; color: #2d3436; }
        #post-content h3 { font-size: 17px; margin: 14px 0 6px; }
        #post-content p { margin-bottom: 10px; line-height: 1.8; }
        #post-content ul, #post-content ol { margin: 8px 0 16px 20px; }
        #post-content li { margin-bottom: 4px; }
        #post-content code {
            background: #f1f3f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 14px;
        }
        #post-content pre {
            background: #1e2a3a;
            color: #e0e0e0;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
        }
        #post-content pre code {
            background: transparent;
            padding: 0;
        }
        #post-content blockquote {
            border-left: 4px solid #0984e3;
            padding-left: 14px;
            color: #636e72;
            margin: 12px 0;
        }
        #post-content hr {
            border: none;
            height: 1px;
            background: #dfe6e9;
            margin: 20px 0;
        }
        #post-content strong { font-weight: 600; }
        #post-content em { font-style: italic; }

        body.dark-mode #post-content h2 { color: #e0e0e0; }
        body.dark-mode #post-content code { background: #2d3748; color: #e0e0e0; }
        body.dark-mode #post-content blockquote { color: #a0aec0; }
    </style>
</head>
<body>

<div class="container">

    <header>
        <h1>📝 博客</h1>
        <p class="subtitle"><a href="index.html">← 返回主页</a></p>
    </header>

    <hr class="divider">

    <!-- 博客列表视图 -->
    <div id="post-list">
        <!-- 分类筛选 -->
        <div class="category-filter" id="category-filter"></div>
        <!-- 文章列表 -->
        <div id="post-items"></div>
    </div>

    <!-- 文章阅读视图 -->
    <div id="post-content">
        <a href="#" class="back-link" id="back-btn">← 返回文章列表</a>
        <div id="post-body"></div>
    </div>

    <footer>
        <p>&copy; 2026 刘靖臣</p>
    </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// ===== 加载文章索引 =====
let allPosts = [];
let activeCategory = '全部';

fetch('posts/posts.json')
    .then(r => r.json())
    .then(posts => {
        allPosts = posts;
        renderCategories();
        renderPosts(posts);

        // 检查 URL 是否有 ?post=xxx
        const params = new URLSearchParams(window.location.search);
        const postFile = params.get('post');
        if (postFile) {
            loadPost(postFile);
        }
    });

// ===== 渲染分类筛选 =====
function renderCategories() {
    const cats = ['全部', ...new Set(allPosts.flatMap(p => p.categories))];
    const container = document.getElementById('category-filter');

    cats.forEach(cat => {
        const tag = document.createElement('span');
        tag.className = 'category-tag' + (cat === '全部' ? ' active' : '');
        tag.textContent = cat;
        tag.onclick = () => filterByCategory(cat);
        container.appendChild(tag);
    });
}

// ===== 按分类筛选 =====
function filterByCategory(cat) {
    activeCategory = cat;
    document.querySelectorAll('.category-tag').forEach(t => {
        t.classList.toggle('active', t.textContent === cat);
    });

    const filtered = cat === '全部'
        ? allPosts
        : allPosts.filter(p => p.categories.includes(cat));

    renderPosts(filtered);
}

// ===== 渲染文章列表 =====
function renderPosts(posts) {
    const container = document.getElementById('post-items');
    container.innerHTML = '';

    if (posts.length === 0) {
        container.innerHTML = '<p style="color: #636e72">该分类下暂无文章 ✍️</p>';
        return;
    }

    posts.forEach(post => {
        const item = document.createElement('div');
        item.className = 'post-item';
        item.innerHTML = `
            <h3><a href="?post=${encodeURIComponent(post.file)}">${post.title}</a></h3>
            <div class="post-meta">
                ${post.date}
                <span class="post-categories">
                    ${post.categories.map(c => `<span>${c}</span>`).join('')}
                </span>
            </div>
            <p class="post-summary">${post.summary}</p>
        `;
        container.appendChild(item);
    });
}

// ===== 加载并显示文章 =====
function loadPost(file) {
    document.getElementById('post-list').classList.add('hidden');
    document.getElementById('post-list').classList.remove('active');
    document.getElementById('post-content').classList.add('active');

    fetch(file)
        .then(r => r.text())
        .then(md => {
            // 解析文章标题和正文
            const lines = md.split('\n');
            const title = lines[0].replace(/^#\s*/, '');
            const body = marked.parse(md);

            document.getElementById('post-body').innerHTML = body;
            document.title = title + ' - 刘靖臣的博客';
        });
}

// ===== 返回列表 =====
document.getElementById('back-btn').addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById('post-content').classList.remove('active');
    document.getElementById('post-list').classList.remove('hidden');
    document.getElementById('post-list').classList.add('active');
    window.history.pushState({}, '', 'blog.html');
    document.title = '博客 - 刘靖臣';
});
</script>

</body>
</html>
